<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ethan Zenker – Projects</title>
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="nav.js" defer></script>
</head>

<body>
  <img src="images/symbolaccentleft.png" class="accent-left" alt="Accent Symbol">
  <img src="images/symbolaccentright.png" class="accent-right" alt="Accent Symbol">

  <header>
    <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation">&#9776;</button>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="projects.html" class="active-page">Projects</a>
      <a href="articles.html">Articles</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <div style="padding: 30px;">
    <h2>Projects</h2>

    <input type="text" id="searchBar" placeholder="Search projects..." oninput="filterCards()">

    <img id="no-results-image" src="images/404notfound.png" alt="No results found"
      style="display:none; max-width:300px; margin: 20px auto;">

    <!-- Project Card Grid -->
    <!-- To add a card: copy a block, set href to projects/your-page.html, update background-image and title -->
    <div class="project-card-grid">

      <div class="project-thumb filterable-card"
           data-href="projects/server.html"
           onclick="window.location.href=this.dataset.href">
        <div class="project-thumb-img" style="background-image: url('images/server-thumbnail.jpg');"></div>
        <div class="thumb-overlay">
          <h3 class="thumb-title">Server Build</h3>
        </div>
      </div>

      <div class="project-thumb filterable-card"
           data-href="projects/ezenk-alpha.html"
           onclick="window.location.href=this.dataset.href">
        <div class="project-thumb-img" style="background-image: url('');"></div>
        <div class="thumb-overlay">
          <h3 class="thumb-title">EZENK ALPHA</h3>
        </div>
      </div>

      <div class="project-thumb filterable-card"
           data-href="projects/project-2.html"
           onclick="window.location.href=this.dataset.href">
        <div class="project-thumb-img" style="background-image: url('');"></div>
        <div class="thumb-overlay">
          <h3 class="thumb-title">Project Title</h3>
        </div>
      </div>

    </div>
  </div>

  <script>
    const searchCache = {};

    document.addEventListener('DOMContentLoaded', async () => {
      const cards = document.querySelectorAll('.filterable-card[data-href]');
      await Promise.all(Array.from(cards).map(async card => {
        const url = card.dataset.href;
        try {
          const res = await fetch(url);
          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          const content = doc.querySelector('.article-content');
          searchCache[url] = content ? content.textContent : '';
        } catch {
          searchCache[url] = '';
        }
      }));
    });

    function filterCards() {
      const query = document.getElementById('searchBar').value.toLowerCase();
      const cards = document.querySelectorAll('.filterable-card');
      const noResults = document.getElementById('no-results-image');
      let anyVisible = false;

      cards.forEach(card => {
        const cardText = card.textContent.toLowerCase();
        const detailText = (searchCache[card.dataset.href] || '').toLowerCase();
        const matches = cardText.includes(query) || detailText.includes(query);
        card.style.display = matches ? '' : 'none';
        if (matches) anyVisible = true;
      });

      noResults.style.display = anyVisible ? 'none' : 'block';
    }
  </script>
</body>
</html>
